<section class="container py-4">
  <div class="text-center mb-4">
    <h2 class="fw-semibold">Selecionar horário</h2>
    <p class="text-muted">Escolha uma data e um horário disponível</p>
  </div>

  <div class="row g-3 align-items-end mb-3">
    <div class="col-12 col-sm-4">
      <label class="form-label">Data</label>
      <input type="date" class="form-control" [(ngModel)]="date" (change)="loadSlots()">
    </div>
    <div class="col-12 col-sm-4">
      <label class="form-label">Duração (min)</label>
      <input type="number" class="form-control" [(ngModel)]="durationMinutes" (change)="loadSlots()" min="15" step="15">
    </div>
  </div>

  <div class="mb-3">
    <div class="d-flex flex-wrap gap-2">
      <button *ngFor="let s of slots" [disabled]="s.booked" class="btn" [ngClass]="s.booked ? 'btn-outline-secondary' : 'btn-outline-success'" (click)="selectSlot(s)">
        {{ s.label }}
      </button>
    </div>
    <div class="text-muted small mt-2" *ngIf="slots?.length === 0">Nenhum horário disponível para a data selecionada.</div>
  </div>

  <div class="mt-4">
    <button class="btn btn-success" [disabled]="!time || creating" (click)="confirmar()">Confirmar</button>
  </div>
</section>
